name: crous-watch

# GitHub cron cannot fire every minute (5-min floor, often slower). So instead of
# one --once pass per schedule, we run the script's INTERNAL loop inside a single
# long-lived job. A job can run up to 6h, so we loop (polling ~every 60s) for
# ~5h55m, then the schedule starts a fresh job. Result: near-continuous 1-minute
# checks, with only a short gap every ~6 hours.
on:
  # DISABLED: this project now runs 24/7 on an EC2 instance (see deploy/EC2-SETUP.md).
  # Running both would send duplicate alerts. Re-enable the schedule below only if
  # you stop the EC2 service.
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch: {}       # manual-only; won't run on a schedule anymore

concurrency:
  group: crous-watch          # never run two workers at once
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 358      # just under GitHub's 6h hard cap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Restore seen-state
        uses: actions/cache/restore@v4
        with:
          path: seen.json
          key: crous-seen-v2-${{ github.run_id }}
          restore-keys: |
            crous-seen-v2-

      - name: Run watcher loop (~1 min interval, exits before 6h cap)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEARCH_URLS: >-
            https://trouverunlogement.lescrous.fr/tools/42/search?bounds=3.9858192_49.303187_4.1302563_49.2039186|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=-1.7525876_48.1549705_-1.6244045_48.0769155|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=4.0411689_48.3185905_4.1111417_48.2663185|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=7.1819535_43.7607635_7.323912_43.6454189|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=5.8795028_43.171494_5.9873841_43.1010435|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=2.9679677_50.6612596_3.125725_50.6008363|https://trouverunlogement.lescrous.fr/tools/42/search?bounds=8.926502_42.344665_9.211775_42.203174
          NOTIFY_ON_FIRST_RUN: "true"
          POLL_INTERVAL: "55"   # ~55s + ~5s of requests ≈ 1 minute per cycle
          JITTER: "5"
        # Loop mode (no --once). Stop ~5m before the timeout so the cache saves.
        run: timeout 21000 python crous_watch.py || true

      - name: Save seen-state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen.json
          key: crous-seen-v2-${{ github.run_id }}
